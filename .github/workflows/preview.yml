name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: pr-preview-${{ github.event.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  preview:
    name: Deploy PR Preview
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Typst
        if: github.event.action != 'closed'
        uses: typst-community/setup-typst@v4
        with:
          typst-version: 'latest'

      - name: Install Python dependencies
        if: github.event.action != 'closed'
        run: pip install Pillow

      - name: Install Node dependencies
        if: github.event.action != 'closed'
        run: npm ci

      - name: Copy docs from touying submodule
        if: github.event.action != 'closed'
        run: npm run copy-docs

      - name: Generate API reference documentation
        if: github.event.action != 'closed'
        run: npm run generate-docs

      - name: Generate slide preview images
        if: github.event.action != 'closed'
        run: npm run generate-images

      - name: Build website (with PR base URL)
        if: github.event.action != 'closed'
        run: npm run build
        env:
          # Set baseUrl so assets load correctly from /pr-preview/pr-NNN/
          DOCUSAURUS_BASE_URL: /pr-preview/pr-${{ github.event.number }}/

      - name: Deploy / clean-up preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: build
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto
